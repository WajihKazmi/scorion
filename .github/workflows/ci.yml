name: Scorion CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Unit tests
        run: ./build/ScorionTests

      - name: Artifact smoke
        run: |
          test -d build/Scorion_artefacts/Release/Standalone/Scorion.app
          test -d build/Scorion_artefacts/Release/VST3/Scorion.vst3
          test -d build/Scorion_artefacts/Release/AU/Scorion.component

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scorion-macos
          path: |
            build/Scorion_artefacts/Release/Standalone/Scorion.app
            build/Scorion_artefacts/Release/VST3/Scorion.vst3
            build/Scorion_artefacts/Release/AU/Scorion.component

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (VST3 only)
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DSCORION_BUILD_AU=OFF
          -DSCORION_BUILD_STANDALONE=OFF
          -DSCORION_BUILD_TESTS=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target Scorion_VST3 --parallel

      - name: Pack lean dist
        shell: pwsh
        run: .\installer\windows\pack_dist.ps1 -BuildDir build

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Package Windows VST3 bundle
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\ScorionSetup.iss
          New-Item -ItemType Directory -Force -Path releases | Out-Null
          Copy-Item -Force dist\Scorion-Setup-Windows.exe releases\Scorion-Setup-Windows.exe

      - name: Upload Windows VST3
        uses: actions/upload-artifact@v4
        with:
          name: scorion-windows
          path: |
            dist/windows/Scorion.vst3
            dist/windows/ScorionResources
            dist/Scorion-Setup-Windows.exe
            releases/Scorion-Setup-Windows.exe

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: releases/Scorion-Setup-Windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
